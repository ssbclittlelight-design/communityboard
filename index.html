<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小組留言板 | Fellowship Board</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'church-fellowship-gh';

        function App() {
            const [user, setUser] = useState(null);
            const [posts, setPosts] = useState([]);
            const [newPost, setNewPost] = useState('');
            const [authorName, setAuthorName] = useState('');
            const [isAnonymous, setIsAnonymous] = useState(false);
            const [isPosting, setIsPosting] = useState(false);

            useEffect(() => {
                // Auth Logic
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection(`artifacts/${appId}/public/data/posts`)
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setPosts(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    });
                return () => unsubscribe();
            }, [user]);

            const handlePost = async (e) => {
                e.preventDefault();
                if (!newPost.trim() || (!isAnonymous && !authorName.trim())) return;
                setIsPosting(true);
                try {
                    await db.collection(`artifacts/${appId}/public/data/posts`).add({
                        content: newPost,
                        author: isAnonymous ? "匿名成員 Anonymous" : authorName,
                        isAnonymous,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        likes: 0
                    });
                    setNewPost('');
                    if (!isAnonymous) setAuthorName('');
                } catch (e) { alert("發送失敗: " + e.message); }
                finally { setIsPosting(false); }
            };

            const handleLike = async (id, current) => {
                await db.doc(`artifacts/${appId}/public/data/posts/${id}`).update({ likes: (current || 0) + 1 });
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white border-b p-4 shadow-sm">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded text-white font-bold text-xl">†</div>
                                <h1 className="font-bold text-lg text-slate-800">小組留言板</h1>
                            </div>
                            <span className="text-[10px] text-slate-400 font-mono hidden sm:block">GitHub Pages Deployment</span>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-6">
                        {/* Guideline */}
                        <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-3 text-blue-800 text-sm">
                            <span className="text-xl">📢</span>
                            <div>
                                <p className="font-bold">社群守則 & 告示 Community Guidelines</p>
                                <p className="opacity-80">請使用造就人的言語，嚴禁不當語言。 Let's keep our conversations edifying and respectful.</p>
                            </div>
                        </div>

                        {/* Input Area */}
                        <section className="bg-white p-6 rounded-2xl border shadow-sm space-y-4">
                            <div className="flex flex-col sm:flex-row gap-3">
                                <input 
                                    className={`flex-1 px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition ${isAnonymous ? 'bg-slate-100' : ''}`}
                                    placeholder={isAnonymous ? "匿名模式開啟中" : "你的名字 Your Name"}
                                    value={authorName}
                                    onChange={e => setAuthorName(e.target.value)}
                                    disabled={isAnonymous}
                                />
                                <div 
                                    className="flex items-center gap-2 cursor-pointer bg-slate-50 px-3 py-2 rounded-lg border"
                                    onClick={() => setIsAnonymous(!isAnonymous)}
                                >
                                    <div className={`w-8 h-4 rounded-full relative ${isAnonymous ? 'bg-blue-500' : 'bg-slate-300'}`}>
                                        <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${isAnonymous ? 'left-4.5' : 'left-0.5'}`} style={{left: isAnonymous ? '1.1rem' : '0.125rem'}}></div>
                                    </div>
                                    <span className="text-xs font-bold text-slate-600">匿名發言</span>
                                </div>
                            </div>
                            <textarea 
                                className="w-full p-4 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none h-32 resize-none"
                                placeholder="分享你的點滴、代禱事項... Share your message..."
                                value={newPost}
                                onChange={e => setNewPost(e.target.value)}
                            />
                            <div className="flex justify-end">
                                <button 
                                    onClick={handlePost}
                                    disabled={isPosting}
                                    className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 disabled:opacity-50 transition"
                                >
                                    {isPosting ? '處理中...' : '發布留言 Post'}
                                </button>
                            </div>
                        </section>

                        {/* Posts List */}
                        <div className="space-y-4">
                            {posts.map(post => (
                                <div key={post.id} className="bg-white p-6 rounded-2xl border shadow-sm hover:shadow-md transition">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${post.isAnonymous ? 'bg-slate-100 text-slate-400' : 'bg-blue-100 text-blue-600'}`}>
                                            {post.isAnonymous ? '?' : post.author?.[0]}
                                        </div>
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <h4 className="font-bold text-slate-800">{post.author}</h4>
                                                {post.isAnonymous && <span className="text-[10px] text-slate-400 border px-1 rounded">ANON</span>}
                                            </div>
                                            <p className="text-[10px] text-slate-400">{post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : 'Loading...'}</p>
                                        </div>
                                    </div>
                                    <p className="text-slate-700 whitespace-pre-wrap leading-relaxed">{post.content}</p>
                                    <div className="mt-4 pt-4 border-t flex gap-4">
                                        <button onClick={() => handleLike(post.id, post.likes)} className="flex items-center gap-1 text-slate-400 hover:text-pink-500">
                                            <span className={post.likes > 0 ? "text-pink-500" : ""}>❤</span>
                                            <span className="text-xs font-bold">{post.likes || 0}</span>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="py-10 text-center text-slate-400 text-xs">
                        <p>© {new Date().getFullYear()} Church Fellowship Group</p>
                        <p>願主祝福你們的分享！</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
